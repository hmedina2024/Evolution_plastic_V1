{% extends 'public/base_cpanel.html' %}
{% block title %}Logs de Acceso{% endblock %}

{% block customCSS %}
<link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='assets/css/my_style.css') }}">
{% endblock %}

{% block body %}
<div class="card" style="border-radius: 0px !important">
  <div class="row justify-content-center mb-0">
    <div class="col-md-12 mb-0">
      <h3 class="text-center mt-0 mb-3"><i class="bi bi-shield-lock me-2"></i>LOGS DE ACCESO Y AUDITORÍA</h3>
      <hr />
    </div>

    <div class="row justify-content-end mb-3">
      <div class="col-md-4 position-relative mt-0 py-3">
        <label for="filterBusqueda" class="form-label small text-muted" style="position: absolute; top: -10px; left: 10px; background: white; padding: 0 5px;">Buscar</label>
        <input type="text" id="filterBusqueda" class="form-control" placeholder="Usuario, acción, módulo, IP...">
      </div>
    </div>

    <div class="row justify-content-center mb-2">
      <div class="table-responsive text-nowrap table-hover">
        <table id="tbl_logs" class="table table-striped table-bordered" cellspacing="0" width="100%">
          <thead>
            <tr>
              <th style="position: sticky; top: 0; background: #395c83; color: white; z-index: 1;">#</th>
              <th style="position: sticky; top: 0; background: #395c83; color: white; z-index: 1;">Fecha</th>
              <th style="position: sticky; top: 0; background: #395c83; color: white; z-index: 1;">Usuario</th>
              <th style="position: sticky; top: 0; background: #395c83; color: white; z-index: 1;">Acción</th>
              <th style="position: sticky; top: 0; background: #395c83; color: white; z-index: 1;">Módulo</th>
              <th style="position: sticky; top: 0; background: #395c83; color: white; z-index: 1;">Descripción</th>
              <th style="position: sticky; top: 0; background: #395c83; color: white; z-index: 1;">IP</th>
            </tr>
          </thead>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block customJS %}
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
<script>
$(document).ready(function() {
    function badgeAccion(a) {
        var map = {
            'login': 'success', 'login_fallido': 'danger',
            'logout': 'secondary', 'eliminacion': 'warning'
        };
        var color = map[a] || 'info';
        var textDark = (color === 'warning') ? ' text-dark' : '';
        return '<span class="badge bg-' + color + textDark + '">' + a + '</span>';
    }

    var table = $('#tbl_logs').DataTable({
        "serverSide": true,
        "ajax": {
            "url": "/buscando-logs-acceso",
            "type": "POST",
            "contentType": "application/json",
            "data": function(d) {
                d.busqueda = $('#filterBusqueda').val();
                return JSON.stringify(d);
            },
            "dataSrc": function(json) { return json.data || []; },
            "error": function(xhr, error, thrown) {
                console.log("Error en AJAX: ", xhr.status, error, thrown);
            }
        },
        "columns": [
            { "data": null, "render": function(data, type, row, meta) { return meta.row + meta.settings._iDisplayStart + 1; }, "orderable": false },
            { "data": "fecha" },
            { "data": "usuario" },
            { "data": "accion", "render": function(d) { return d ? badgeAccion(d) : ''; } },
            { "data": "modulo" },
            { "data": "descripcion" },
            { "data": "ip" }
        ],
        "pageLength": 15,
        "order": [],
        "responsive": true,
        "scrollY": "500px",
        "scrollX": true,
        "scrollCollapse": true,
        "processing": true,
        "language": { "url": "{{ url_for('static', filename='assets/i18n/datatables-es.json') }}" },
        "searching": false,
        "dom": 'lfrtip'
    });

    var debounceTimer;
    $('#filterBusqueda').on('keyup', function() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function() { table.ajax.reload(); }, 250);
    });
});
</script>
{% endblock %}
