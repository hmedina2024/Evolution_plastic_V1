<!DOCTYPE html>
<html
  lang="es"
  class="light-style customizer-hide"
  dir="ltr"
  data-theme="theme-default"
  data-assets-path="../assets/"
  data-template="vertical-menu-template-free">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>{% block crud %}{% endblock %}</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="{{ url_for('static', filename ='assets/img/favicon.ico') }}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css" />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename ='assets/vendor/fonts/boxicons.css') }}" />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename ='assets/vendor/css/core.css') }}"
      class="template-customizer-core-css" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename ='assets/vendor/css/theme-default.css') }}"
      class="template-customizer-theme-css" />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename ='assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css') }}" />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename ='assets/vendor/css/pages/page-auth.css') }}" />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename ='assets/css/my_style.css') }}" />

    <script src="{{ url_for('static', filename ='assets/vendor/js/helpers.js') }}"></script>
    <script src="{{ url_for('static', filename ='assets/js/config.js') }}"></script>
  </head>

  <body>
    <div id="loader-out">
      <div id="loader-container">
        <p id="loading-text">Cargando</p>
      </div>
    </div>

    {% include 'public/includes/messages.html' %}
    <!--cuerpo-->
    {% block body %}

    <!--Include-->
    {% include 'public/login/auth_login.html' %}
    <!--fin del cuerpo-->
    {% endblock %}

    <script src="{{ url_for('static', filename='assets/customJS/home.js') }}"></script>
    <script>
      // Toggle visibilidad de contraseña
      document.querySelectorAll('.form-password-toggle i').forEach(function(icon) {
        icon.style.cursor = 'pointer';
        icon.addEventListener('click', function() {
          var container = icon.closest('.form-password-toggle');
          var input = container.querySelector('input[type="password"], input[type="text"]');
          if (!input) return;
          if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bx-hide', 'bx-show');
          } else {
            input.type = 'password';
            icon.classList.replace('bx-show', 'bx-hide');
          }
        });
      });

      // Prevenir doble submit
      document.addEventListener('submit', function(e) {
        var btn = e.target.querySelector('button[type="submit"], input[type="submit"]');
        if (!btn || btn.disabled) return;
        btn.disabled = true;
        btn._originalText = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span> Procesando...';
        window.addEventListener('pageshow', function() {
          btn.disabled = false;
          btn.innerHTML = btn._originalText;
        }, { once: true });
      });
    </script>
  </body>
</html>
