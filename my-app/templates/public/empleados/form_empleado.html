{% extends 'public/base_cpanel.html' %}

{% block title %}Registrar Empleado{% endblock %}

{% block customCSS %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link rel="stylesheet" href="{{ url_for('static', filename='assets/css/file.css') }}" />
{% endblock %}

{% block body %}
<div class="card shadow-sm" style="border-radius: 10px;">
  <div class="card-header bg-primary text-white text-center">
    <h3 class="fw-bold">REGISTRAR NUEVO EMPLEADO</h3>
  </div>
  <div class="card-body p-4">
    <form class="form-horizontal mx-auto" method="POST" action="/form-registrar-empleado" autocomplete="off" enctype="multipart/form-data" id="registroForm">
      <div class="row g-4">
        <div class="col-md-4">
          <label for="documento" class="form-label fw-bold text-primary">Documento <span class="text-danger">*</span></label>
          <input class="form-control" type="text" name="documento" id="documento" value="{{ data_form.documento if data_form and 'documento' in data_form else '' }}" required />
          <div id="documento-error" class="text-danger"></div>
        </div>
        <div class="col-md-4">
          <label for="id_empresa" class="form-label fw-bold text-primary">Empresa <span class="text-danger">*</span></label>
          <select name="id_empresa" id="id_empresa" class="form-control select2" required>
            <option value="">Seleccionar empresa...</option>
            {% if data_form and 'id_empresa' in data_form %}
              <option value="{{ data_form.id_empresa }}" selected>{{ data_form.id_empresa }}</option>
            {% endif %}
          </select>
        </div>
        <div class="col-md-4">
          <label for="id_proceso" class="form-label fw-bold text-primary">Proceso <span class="text-danger">*</span></label>
          <select name="id_proceso" id="id_proceso" class="form-control select2" required>
            <option value="">Seleccionar proceso...</option>
            {% if data_form and 'id_proceso' in data_form %}
              <option value="{{ data_form.id_proceso }}" selected>{{ data_form.id_proceso }}</option>
            {% endif %}
          </select>
        </div>
        <!-- Campo oculto para tipo_empleado que se llenará automáticamente -->
        <input type="hidden" name="tipo_empleado" id="tipo_empleado" value="">
      </div>
      <div class="row g-4 mt-3">
        <div class="col-md-4">
          <label for="nombre_empleado" class="form-label fw-bold text-primary">Nombre del empleado <span class="text-danger">*</span></label>
          <input type="text" name="nombre_empleado" class="form-control" value="{{ data_form.nombre_empleado if data_form and 'nombre_empleado' in data_form else '' }}" required />
        </div>
        <div class="col-md-4">
          <label for="apellido_empleado" class="form-label fw-bold text-primary">Apellido del empleado <span class="text-danger">*</span></label>
          <input class="form-control" type="text" name="apellido_empleado" value="{{ data_form.apellido_empleado if data_form and 'apellido_empleado' in data_form else '' }}" required />
        </div>
        <div class="col-md-4">
          <label for="telefono_empleado" class="form-label fw-bold text-primary">Teléfono </label>
          <input class="form-control" type="text" name="telefono_empleado" value="{{ data_form.telefono_empleado if data_form and 'telefono_empleado' in data_form else '' }}" pattern="[0-9]*" inputmode="numeric" onkeypress="return event.charCode >= 48 && event.charCode <= 57"/>
        </div>
      </div>
      <div class="row g-4 mt-3">
        <div class="col-md-4">
          <label for="email_empleado" class="form-label fw-bold text-primary">Email </label>
          <input class="form-control" type="email" name="email_empleado" value="{{ data_form.email_empleado if data_form and 'email_empleado' in data_form else '' }}" />
        </div>
        <div class="col-md-4">
          <label for="cargo" class="form-label fw-bold text-primary">Cargo </label>
          <select class="form-select" name="cargo">
            <option value="" disabled selected>Seleccione un cargo</option>
            {% for cargo in cargos %}
              <option value="{{ cargo.nombre_cargo }}" {% if data_form and data_form.cargo == cargo.nombre_cargo %}selected{% endif %}>{{ cargo.nombre_cargo }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label for="foto_empleado" class="form-label fw-bold text-primary">Cargar Imagen del Empleado</label>
          <div class="avatar-upload">
            <div class="avatar-edit">
              <input type="file" name="foto_empleado" id="imageUpload" accept=".png, .jpg, .jpeg" />
              <label for="imageUpload"><i class="bi bi-pen"></i></label>
            </div>
            <div class="avatar-preview">
              {% set url_avatar= url_for('static', filename='assets/img/avatar.png') %}
              <div id="imagePreview" style="background-image: url('{{ url_avatar }}')"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="mb-3 mt-4 text-center">
        <button type="submit" class="btn rounded-pill btn-primary" id="submitBtn">
          Guardar registro ahora <i class="bi bi-arrow-clockwise"></i>
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block customJS %}
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="{{ url_for('static', filename='assets/customJS/file.js') }}"></script>
<script>
$(document).ready(function () {
    // Configuración de Select2 para empresas
    const $selectEmpresa = $('#id_empresa');
    $selectEmpresa.select2({
        placeholder: 'Seleccionar empresa...',
        allowClear: true,
        minimumInputLength: 0,
        dropdownAutoWidth: true,
        ajax: {
            url: '/api/empresas',
            dataType: 'json',
            delay: 250,
            data: function (params) {
                return {
                    search: params.term || '',
                    page: params.page || 1,
                    per_page: 10
                };
            },
            processResults: function (data) {
                return {
                    results: data.empresas.map(item => ({
                        id: item.id_empresa,
                        text: item.nombre_empresa,
                        tipo_empresa: item.tipo_empresa // Guardamos el tipo de empresa
                    })),
                    pagination: { more: data.empresas.length === 10 }
                };
            },
            cache: true
        },
        templateResult: function (data) {
            return data.text;
        },
        templateSelection: function (data) {
            return data.text || data.id;
        }
    }).on('select2:open', function () {
        setTimeout(() => {
            document.querySelector('.select2-search__field').focus();
        }, 50);
    }).on('select2:select', function (e) {
        // Cuando se selecciona una empresa, asignar automáticamente el tipo de empleado
        const tipoEmpresa = e.params.data.tipo_empresa;
        const $tipoEmpleadoHidden = $('#tipo_empleado');
        
        if (tipoEmpresa === 'Temporal') {
            $tipoEmpleadoHidden.val('2'); // ID 2 para Temporal
        } else if (tipoEmpresa === 'Directo') {
            $tipoEmpleadoHidden.val('1'); // ID 1 para Directo
        }
        
        console.log('Tipo de empresa seleccionado:', tipoEmpresa, '- Tipo empleado asignado:', $tipoEmpleadoHidden.val());
    });

    // Si hay un valor preseleccionado (en caso de error), cargarlo
    if ($selectEmpresa.val()) {
        const value = $selectEmpresa.val();
        $.ajax({
            url: '/api/empresas',
            data: { id: value },
            dataType: 'json'
        }).then(data => {
            const optionData = data.empresas.find(item => item.id_empresa == value);
            if (optionData) {
                const option = new Option(optionData.nombre_empresa, optionData.id_empresa, true, true);
                option.dataset.tipoEmpresa = optionData.tipo_empresa;
                $selectEmpresa.append(option).trigger('change');
                
                // Asignar tipo de empleado automáticamente
                if (optionData.tipo_empresa === 'Temporal') {
                    $('#tipo_empleado').val('2');
                } else if (optionData.tipo_empresa === 'Directo') {
                    $('#tipo_empleado').val('1');
                }
            }
        });
    }

    // Configurar Select2 para procesos
    const $selectProceso = $('#id_proceso');
    $selectProceso.select2({
        placeholder: 'Seleccionar proceso...',
        allowClear: true,
        minimumInputLength: 0,
        dropdownAutoWidth: true,
        ajax: {
            url: '/api/procesos',
            dataType: 'json',
            delay: 250,
            data: function (params) {
                return {
                    search: params.term || '',
                    page: params.page || 1,
                    per_page: 10
                };
            },
            processResults: function (data) {
                return {
                    results: data.procesos.map(item => ({
                        id: item.id_proceso,
                        text: item.nombre_proceso
                    })),
                    pagination: { more: data.procesos.length === 10 }
                };
            },
            cache: true
        },
        templateResult: function (data) {
            return data.text;
        },
        templateSelection: function (data) {
            return data.text || data.id;
        }
    }).on('select2:open', function () {
        setTimeout(() => {
            document.querySelector('.select2-search__field').focus();
        }, 50);
    });

    // Si hay un valor preseleccionado para proceso (en caso de error), cargarlo
    if ($selectProceso.val()) {
        const value = $selectProceso.val();
        $.ajax({
            url: '/api/procesos',
            data: { id: value },
            dataType: 'json'
        }).then(data => {
            const optionData = data.procesos.find(item => item.id_proceso == value);
            if (optionData) {
                const option = new Option(optionData.nombre_proceso, optionData.id_proceso, true, true);
                $selectProceso.append(option).trigger('change');
            }
        });
    }

    // Variable para evitar múltiples envíos
    let isSubmitting = false;
    const submitBtn = $('#submitBtn');

    // Manejar el envío del formulario
    $('#registroForm').on('submit', function (e) {
        e.preventDefault(); // Prevenir el envío por defecto

        // Si ya se está enviando, no hacer nada
        if (isSubmitting) {
            return false;
        }

        // Validar el formulario
        const form = this;
        if (form.checkValidity()) {
            isSubmitting = true; // Marcar como enviando
            submitBtn.prop('disabled', true).text('Guardando...'); // Deshabilitar y cambiar texto

            // Enviar el formulario manualmente
            form.submit();
        } else {
            form.reportValidity(); // Mostrar errores de validación del navegador
        }
    });

    // Validar documento del empleado (Eliminado para permitir duplicados)
});
</script>
{% endblock %}
